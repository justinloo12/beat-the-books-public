name: Refresh Live Odds

on:
  workflow_dispatch:
  schedule:
    # Every 10 min, 2pm–11pm ET (18:00–03:00 UTC next day) — covers all game windows
    - cron: "*/10 18,19,20,21,22,23 * * *"
    - cron: "*/10 0,1,2,3 * * *"

permissions:
  contents: write

jobs:
  refresh-odds:
    runs-on: ubuntu-latest
    env:
      MLB_MODEL_ODDS_API_KEY: ${{ secrets.MLB_MODEL_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e . -q

      - name: Fetch live odds
        run: python -m mlb_model.refresh_live_odds

      - name: Commit live_odds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/live_odds.json
          git diff --cached --quiet && exit 0
          git commit -m "Live odds refresh $(date -u +%H:%M UTC)"
          git pull --rebase origin main
          git push
