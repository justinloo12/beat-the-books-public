name: Backtest Model (60/20/20)

on:
  workflow_dispatch:
    inputs:
      full_start:
        description: "First date of full backtest range (YYYY-MM-DD)"
        default: "2025-07-01"
      full_end:
        description: "Last date of full backtest range (YYYY-MM-DD)"
        default: "2025-08-31"
      train_end:
        description: "Last date of training split (short — Jul 1–14; model has no fitted params)"
        default: "2025-07-14"
      val_end:
        description: "Last date of validation split (Jul 15–28; used by the sweep)"
        default: "2025-07-28"
      statcast_start:
        description: "Statcast download start (should be ~2 weeks before full_start)"
        default: "2025-06-15"
      sample_every_n_days:
        description: "Sample every Nth day to save Odds API credits (1 = every day, 2 = every other, 3 = every third)"
        default: "1"
      skip_existing:
        description: "Skip board dates that are already saved (resume a partial run)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      MLB_MODEL_ODDS_API_KEY: ${{ secrets.MLB_MODEL_ODDS_API_KEY }}
      MLB_MODEL_TOMORROW_API_KEY: ${{ secrets.MLB_MODEL_TOMORROW_API_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # -----------------------------------------------------------------------
      # Persist the paid historical-odds snapshots across runs. The Odds API
      # charges ~30 credits per date, but each date's odds never change once the
      # game is in the past — so we only ever need to pay for a date ONCE.
      #
      # This rolling cache restores every odds snapshot downloaded by any prior
      # run (restore-keys prefix-match grabs the most recent cache), then saves a
      # superset under a fresh run-scoped key at job end. download_odds skips any
      # date whose file already exists, so cached dates cost ZERO credits. Net
      # effect: pay once per calendar date, then re-run the backtest unlimited
      # times for free — and if credits run out mid-run, the next run resumes
      # from the last paid date instead of starting over.
      # -----------------------------------------------------------------------
      - name: Restore/rotate odds + Statcast cache
        uses: actions/cache@v4
        with:
          path: |
            data/odds_api
            data/baseball_savant
          key: backtest-data-${{ github.run_id }}
          restore-keys: |
            backtest-data-

      # -----------------------------------------------------------------------
      # Phase 0: download Statcast for the full season so per-batter split
      # profiles and park metrics are available for every game date.
      # -----------------------------------------------------------------------
      - name: Download Statcast + leaderboards
        run: |
          python -m mlb_model.download_data \
            --start-date "${{ inputs.statcast_start }}" \
            --end-date   "${{ inputs.full_end }}" \
            --seasons 2025 \
            --odds-date "${{ inputs.full_start }}"

      # -----------------------------------------------------------------------
      # Phase 1: simulate daily boards for every date in the full range.
      # One board file per day saved to backtest/data/<date>.json.
      # -----------------------------------------------------------------------
      - name: Run model over full date range
        run: |
          SKIP_FLAG=""
          if [ "${{ inputs.skip_existing }}" = "true" ]; then
            SKIP_FLAG="--skip-existing"
          fi
          python -m mlb_model.backtest_run \
            --start "${{ inputs.full_start }}" \
            --end   "${{ inputs.full_end }}" \
            --every-n-days "${{ inputs.sample_every_n_days }}" \
            $SKIP_FLAG

      # -----------------------------------------------------------------------
      # Phase 2: grade every board against MLB Stats API real scores.
      # -----------------------------------------------------------------------
      - name: Grade full range
        run: |
          python -m mlb_model.backtest_grade \
            --start "${{ inputs.full_start }}" \
            --end   "${{ inputs.full_end }}"

      # -----------------------------------------------------------------------
      # Phase 3: produce split reports — train / validate / test.
      # We grade each split separately so metrics are fully isolated.
      # -----------------------------------------------------------------------
      - name: Grade training split (Jul 1–14)
        run: |
          python -m mlb_model.backtest_grade \
            --start "${{ inputs.full_start }}" \
            --end   "${{ inputs.train_end }}" \
            --out   backtest/results_train.json

      - name: Grade validation split (Jul 15–28)
        run: |
          python -m mlb_model.backtest_grade \
            --start "$(date -d '${{ inputs.train_end }} + 1 day' +%F)" \
            --end   "${{ inputs.val_end }}" \
            --out   backtest/results_val.json

      - name: Grade test/holdout split (Jul 29–Aug 31)
        run: |
          python -m mlb_model.backtest_grade \
            --start "$(date -d '${{ inputs.val_end }} + 1 day' +%F)" \
            --end   "${{ inputs.full_end }}" \
            --out   backtest/results_test.json

      # -----------------------------------------------------------------------
      # Phase 4: print reports for each split to the job log.
      # -----------------------------------------------------------------------
      - name: Report — full range
        run: python -m mlb_model.backtest_report --results backtest/results.json

      - name: Report — training split (60%)
        run: python -m mlb_model.backtest_report --results backtest/results_train.json

      - name: Report — validation split (20%)
        run: python -m mlb_model.backtest_report --results backtest/results_val.json

      - name: Report — test/holdout split (20%)
        run: python -m mlb_model.backtest_report --results backtest/results_test.json

      # -----------------------------------------------------------------------
      # Phase 4b: tune the betting edge thresholds on the validation split and
      # report how those frozen thresholds perform on the untouched holdout.
      # -----------------------------------------------------------------------
      - name: Edge-threshold sweep (validation-tuned, holdout-reported)
        run: |
          python -m mlb_model.backtest_sweep \
            --val  backtest/results_val.json \
            --test backtest/results_test.json

      # -----------------------------------------------------------------------
      # Phase 5: upload all result files as artifacts for offline analysis.
      # -----------------------------------------------------------------------
      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ inputs.full_start }}-${{ inputs.full_end }}
          path: |
            backtest/results.json
            backtest/results_train.json
            backtest/results_val.json
            backtest/results_test.json
          retention-days: 90
