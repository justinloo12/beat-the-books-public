name: Refresh Site

on:
  workflow_dispatch:
  schedule:
    # 11am ET — full run: Statcast + odds + model for the day's slate (15 UTC during EDT)
    - cron: "0 15 * * *"
    # 12:30pm ET — lineup confirmation refresh for ~1pm games, before first pitch (16:30 UTC during EDT)
    - cron: "30 16 * * *"
    # 1pm ET — lineup confirmation refresh: re-exports snapshot with confirmed lineups (17 UTC during EDT)
    - cron: "0 17 * * *"
    # 3pm ET — odds refresh for 4–6pm games (19 UTC during EDT)
    - cron: "0 19 * * *"
    # 6pm ET — odds refresh for 6–10pm games (22 UTC during EDT)
    - cron: "0 22 * * *"

permissions:
  contents: write

# Shared with snapshot-odds.yml so the two data-committing workflows never
# race each other's pushes.
concurrency:
  group: site-data-commit
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
      MLB_MODEL_ODDS_API_KEY: ${{ secrets.MLB_MODEL_ODDS_API_KEY }}
      MLB_MODEL_TOMORROW_API_KEY: ${{ secrets.MLB_MODEL_TOMORROW_API_KEY }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolve ET slate window
        id: slate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_refresh=true" >> "$GITHUB_OUTPUT"
            echo "full_download=true" >> "$GITHUB_OUTPUT"
            echo "slate_date=$(date +%F)" >> "$GITHUB_OUTPUT"
            echo "grade_date=$(date -d 'yesterday' +%F)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour_min=$(date +%H:%M)
          valid_times="11:00 12:30 13:00 15:00 18:00"
          if ! echo "$valid_times" | grep -qw "$hour_min"; then
            echo "run_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_refresh=true" >> "$GITHUB_OUTPUT"
          echo "slate_date=$(date +%F)" >> "$GITHUB_OUTPUT"
          # yesterday in ET for grading
          echo "grade_date=$(date -d 'yesterday' +%F)" >> "$GITHUB_OUTPUT"
          # 11am: full run (Statcast + leaderboards + odds).
          # 12:30pm, 1pm, 3pm, 6pm: odds-only re-exports — capture confirmed lineups
          # ahead of each batch of first pitches.
          if [ "$hour_min" = "11:00" ]; then
            echo "full_download=true" >> "$GITHUB_OUTPUT"
          else
            echo "full_download=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Grade yesterday's picks
        if: steps.slate.outputs.run_refresh == 'true'
        run: |
          python -m mlb_model.grade_picks --date "${{ steps.slate.outputs.grade_date }}" || true

      - name: Download odds and Statcast inputs
        if: steps.slate.outputs.run_refresh == 'true'
        run: |
          ODDS_ONLY_FLAG=""
          if [ "${{ steps.slate.outputs.full_download }}" != "true" ]; then
            ODDS_ONLY_FLAG="--odds-only"
          fi
          python -m mlb_model.download_data \
            --odds-date "${{ steps.slate.outputs.slate_date }}" \
            --start-date "${{ steps.slate.outputs.slate_date }}" \
            --end-date "${{ steps.slate.outputs.slate_date }}" \
            --seasons "$(date +%Y)" \
            --markets h2h totals spreads \
            $ODDS_ONLY_FLAG

      - name: Build live odds snapshot for browser refresh
        if: steps.slate.outputs.run_refresh == 'true'
        run: |
          python -m mlb_model.refresh_live_odds --date "${{ steps.slate.outputs.slate_date }}"

      - name: Export latest board snapshot
        if: steps.slate.outputs.run_refresh == 'true'
        run: |
          python -m mlb_model.export_site --date "${{ steps.slate.outputs.slate_date }}"

      - name: Validate exported snapshot
        if: steps.slate.outputs.run_refresh == 'true'
        id: validate
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          slate_date = "${{ steps.slate.outputs.slate_date }}"
          latest_path = Path("docs/data/latest.json")
          dated_path = Path(f"docs/data/{slate_date}.json")
          payload = json.loads(latest_path.read_text(encoding="utf-8"))
          payload_date = payload.get("date")
          daily = payload.get("daily", {})
          lineup_cards = daily.get("lineup_cards", [])
          skipped = daily.get("skipped", [])
          stale = payload_date != slate_date
          broken = (
              stale
              or not latest_path.exists()
              or not dated_path.exists()
              or not payload
              or (
              not lineup_cards
              and skipped
              and all("processing error" in str(item.get("reason", "")).lower() for item in skipped)
              )
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"snapshot_valid={'false' if broken else 'true'}\n")
          if broken:
              print("Snapshot validation failed.")
              print(f"Expected slate date: {slate_date}")
              print(f"Payload date: {payload_date}")
              print("Refusing to publish a stale or all-error board.")
              latest_path.unlink(missing_ok=True)
              dated_path.unlink(missing_ok=True)
              raise SystemExit(1)
          PY

      - name: Commit refreshed snapshot
        if: steps.slate.outputs.run_refresh == 'true' && steps.validate.outputs.snapshot_valid == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          git add "docs/data/${{ steps.slate.outputs.slate_date }}.json"
          git add docs/data/archive_index.json
          git add docs/data/live_odds.json || true
          git add docs/data/pick_history.json || true
          git add docs/data/metrics.json || true
          git add config/meta_model.json || true
          git diff --cached --quiet && exit 0
          git commit -m "Refresh site snapshot for ${{ steps.slate.outputs.slate_date }}"
          # Merge remote changes before pushing; prefer our freshly-generated
          # data files over remote in the rare case of a concurrent run conflict.
          git pull origin main --no-rebase -X ours
          git push
