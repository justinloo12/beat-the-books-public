name: Refresh Site

on:
  workflow_dispatch:
  schedule:
    # 10am–12pm ET (morning lineup window)  and  3pm–7pm ET (evening game prep)
    - cron: "0 14,15,16,17,19,20,21,22,23 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
      MLB_MODEL_ODDS_API_KEY: ${{ secrets.MLB_MODEL_ODDS_API_KEY }}
      MLB_MODEL_TOMORROW_API_KEY: ${{ secrets.MLB_MODEL_TOMORROW_API_KEY }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolve ET slate window
        id: slate
        run: |
          hour=$(date +%H)
          valid_hours="10 11 12 15 16 17 18 19"
          if ! echo "$valid_hours" | grep -qw "$hour"; then
            echo "run_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_refresh=true" >> "$GITHUB_OUTPUT"
          echo "slate_date=$(date +%F)" >> "$GITHUB_OUTPUT"
          # yesterday in ET for grading
          echo "grade_date=$(date -d 'yesterday' +%F)" >> "$GITHUB_OUTPUT"

      - name: Grade yesterday's picks
        if: steps.slate.outputs.run_refresh == 'true'
        run: |
          python -m mlb_model.grade_picks --date "${{ steps.slate.outputs.grade_date }}" || true

      - name: Download odds and Statcast inputs
        if: steps.slate.outputs.run_refresh == 'true'
        run: |
          python -m mlb_model.download_data \
            --odds-date "${{ steps.slate.outputs.slate_date }}" \
            --start-date "${{ steps.slate.outputs.slate_date }}" \
            --end-date "${{ steps.slate.outputs.slate_date }}" \
            --seasons "$(date +%Y)" \
            --markets h2h totals spreads

      - name: Export latest board snapshot
        if: steps.slate.outputs.run_refresh == 'true'
        run: |
          python -m mlb_model.export_site --date "${{ steps.slate.outputs.slate_date }}"

      - name: Validate exported snapshot
        if: steps.slate.outputs.run_refresh == 'true'
        id: validate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          slate_date = "${{ steps.slate.outputs.slate_date }}"
          latest_path = Path("docs/data/latest.json")
          dated_path = Path(f"docs/data/{slate_date}.json")
          payload = json.loads(latest_path.read_text(encoding="utf-8"))
          daily = payload.get("daily", {})
          lineup_cards = daily.get("lineup_cards", [])
          skipped = daily.get("skipped", [])
          broken = (
              not lineup_cards
              and skipped
              and all("processing error" in str(item.get("reason", "")).lower() for item in skipped)
          )
          with open(Path("${GITHUB_OUTPUT}"), "a", encoding="utf-8") as fh:
              fh.write(f"snapshot_valid={'false' if broken else 'true'}\n")
          if broken:
              print("Snapshot validation failed: refusing to publish an all-error board.")
              print("Keeping the existing published snapshot instead.")
              latest_path.unlink(missing_ok=True)
              dated_path.unlink(missing_ok=True)
          PY

      - name: Commit refreshed snapshot
        if: steps.slate.outputs.run_refresh == 'true' && steps.validate.outputs.snapshot_valid == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          git add "docs/data/${{ steps.slate.outputs.slate_date }}.json"
          git add docs/data/archive_index.json
          git add docs/data/pick_history.json || true
          git diff --cached --quiet && exit 0
          git commit -m "Refresh site snapshot for ${{ steps.slate.outputs.slate_date }}"
          git push
